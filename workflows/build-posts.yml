name: Build Articles

on:
  push:
    paths:
      - 'posts/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate articles.json
        run: |
          python << 'EOF'
          import os
          import re
          import json

          posts = []

          for filename in os.listdir("posts"):
              if filename.endswith(".md"):

                  path = os.path.join("posts", filename)

                  with open(path, "r", encoding="utf-8") as f:
                      content = f.read()

                  title = re.search(r'title:\s*"?(.*?)"?\n', content)
                  description = re.search(r'description:\s*(.*?)\n', content)
                  date = re.search(r'date:\s*(.*?)\n', content)
                  thumbnail = re.search(r'thumbnail:\s*(.*?)\n', content)

                  posts.append({
                      "title": title.group(1) if title else "",
                      "description": description.group(1) if description else "",
                      "date": date.group(1)[:10] if date else "",
                      "thumbnail": thumbnail.group(1) if thumbnail else "",
                      "url": "#"
                  })

          posts.sort(
              key=lambda x:x["date"],
              reverse=True
          )

          with open(
              "articles.json",
              "w",
              encoding="utf-8"
          ) as f:

              json.dump(
                  posts,
                  f,
                  ensure_ascii=False,
                  indent=2
              )
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add articles.json

          git diff --cached --quiet || \
          git commit -m "update articles"

          git push