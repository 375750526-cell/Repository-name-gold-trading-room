<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>XAUUSD Room 后台</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="box">


<h1>XAUUSD Room 后台</h1>


<button id="login">
GitHub 登录
</button>



<div id="editor" style="display:none">


<h2>发布文章</h2>



<label>文章标题</label>

<input
id="title"
placeholder="请输入文章标题">



<label>文章简介</label>

<textarea
id="description"
placeholder="请输入文章简介"></textarea>



<label>发布时间</label>

<input
id="date"
type="date">



<label>封面图片</label>

<input
id="image"
type="file"
accept="image/*">



<label>文章正文</label>

<textarea
id="content"
placeholder="请输入正文内容"></textarea>



<button id="publish">
发布文章
</button>


</div>



<div id="status"></div>


</div>



<script src="admin.js"></script>


</body>

</html>
