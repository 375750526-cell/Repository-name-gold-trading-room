backend:
name: github
repo: 你的GitHub用户名/你的仓库名
branch: main

media_folder: "images"
public_folder: "/images"

collections:

* name: "posts"
  label: "文章管理"
  folder: "posts"
  create: true
  slug: "{{year}}-{{month}}-{{day}}-{{slug}}"

  fields:

  * label: "标题"
    name: "title"
    widget: "string"

  * label: "简介"
    name: "excerpt"
    widget: "text"

  * label: "发布日期"
    name: "date"
    widget: "datetime"

  * label: "封面图"
    name: "image"
    widget: "image"

  * label: "正文"
    name: "body"
    widget: "markdown"
