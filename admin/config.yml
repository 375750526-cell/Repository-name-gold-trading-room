backend:
  name: github
  repo: 375750526-cell/Repository-name-gold-trading-room
  branch: main

media_folder: "resources"
public_folder: "/resources"


collections:
  - name: "posts"
    label: "文章"
    folder: ""
    create: true
    slug: "{{slug}}"

    fields:
      - label: "标题"
        name: "title"
        widget: "string"

      - label: "正文"
        name: "body"
        widget: "markdown"
